; PlatformIO project for the ESP32 Rackbus SL client.
;
; Default target is a generic ESP32 DevKit (ESP32-WROOM-32).
; If you have an S3 / C3 / Pico — uncomment the matching env at the bottom.
;
; Build / flash:
;     pio run -t upload
;     pio device monitor

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = time, log2file
build_flags =
    -std=gnu++17
    -Wall -Wno-unused-variable
build_unflags =
    -std=gnu++11
upload_speed = 921600

[env:esp32dev]
board = esp32dev

[env:esp32dev_ota]
board = esp32dev
upload_protocol = espota
upload_port = promass.local
upload_flags =
    --auth=${sysenv.OTA_PASSWORD}
    --port=3232
    --timeout=60

; --- Wemos LOLIN S2 Mini --------------------------------------------------
; Native USB CDC. Manual bootloader entry: hold BOOT, tap RST, release BOOT.
[env:lolin_s2_mini]
board = lolin_s2_mini
build_flags =
    -std=gnu++17
    -Wall -Wno-unused-variable
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:lolin_s2_mini_ota]
board = lolin_s2_mini
upload_protocol = espota
upload_port = promass.local
upload_flags =
    --auth=${sysenv.OTA_PASSWORD}
    --port=3232
    --timeout=60
build_flags =
    -std=gnu++17
    -Wall -Wno-unused-variable
    -DARDUINO_USB_CDC_ON_BOOT=1


